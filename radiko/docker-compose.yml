services:
  radiko-worker:
    build: .
    container_name: radiko_recorder
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      # AWS Configuration
      - AWS_ACCESS_KEY_ID=${RADIKO_AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${RADIKO_AWS_SECRET_ACCESS_KEY}
      - AWS_REGION=${AWS_REGION:-ap-northeast-1}
      - SQS_QUEUE_URL=${RADIKO_SQS_QUEUE_URL}

      # Google Drive Configuration
      - GDRIVE_FOLDER_ID=${GDRIVE_FOLDER_ID}

      # System Configuration
      - TZ=${TZ:-Asia/Tokyo}

    volumes:
      # Local storage mapping
      - /tmp:/app/downloads
      # Mount the OAuth secrets and token (token must be writable for auto-refresh!)
      - ./token.json:/app/token.json
